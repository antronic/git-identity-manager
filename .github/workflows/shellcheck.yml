name: ShellCheck

on:
  push:
    branches: [main]
    paths:
      - '**.sh'
  pull_request:
    branches: [main]
    paths:
      - '**.sh'

jobs:
  shellcheck:
    name: ShellCheck Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck on git-identity-manager.sh
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          format: gcc
