name: Stale Issues

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale issues & PRs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity in 30 days. It will be closed in 7 days if no further activity occurs.
            If this is still relevant, please leave a comment or remove the `stale` label.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            any activity in 30 days. It will be closed in 7 days if no further activity occurs.
            Please rebase and update if you'd like to keep it open.
          close-issue-message: >
            This issue has been closed due to inactivity. Feel free to reopen if it becomes
            relevant again.
          close-pr-message: >
            This pull request has been closed due to inactivity. Please reopen and rebase
            if you'd like to continue.
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security,bug,enhancement'
          exempt-pr-labels: 'pinned,security'
          operations-per-run: 30
